name: Testing
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-15]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: pdm-project/setup-pdm@v4
        name: Setup PDM
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libomp on macOS
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Install PETSc and SLEPc
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          PETSC_CONFIGURE_OPTIONS: "--with-mpi=0 --download-openblas"
        run: pip install petsc petsc4py slepc slepc4py
      - name: Install dependencies
        run: pdm install -G dev
      - name: Test with pytest & generate coverage
        run: |
          pdm test
